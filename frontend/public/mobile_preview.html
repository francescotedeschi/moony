<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #1a1a2e; display: flex; align-items: flex-start; justify-content: center; padding: 40px 0; min-height: 100vh; font-family: sans-serif; }
  .phone { position: relative; width: 390px; background: #0a0a0f; border-radius: 44px; box-shadow: 0 0 0 10px #1c1c1e, 0 0 0 12px #3a3a3c, 0 30px 80px rgba(0,0,0,0.7); overflow: hidden; }
  .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #0a0a0f; border-radius: 0 0 20px 20px; z-index: 10; }
  .phone-screen { width: 390px; height: 844px; overflow: hidden; border-radius: 44px; }
  iframe { width: 390px; height: 844px; border: none; display: block; }
  .label { color: #555; font-size: 12px; text-align: center; margin-top: 16px; }
</style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <iframe src="http://localhost:5173" scrolling="no"></iframe>
      </div>
    </div>
    <p class="label">iPhone 14 Pro — 390×844px</p>
  </div>
</body>
</html>
