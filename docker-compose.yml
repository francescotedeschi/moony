services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moony
      POSTGRES_PASSWORD: moony
      POSTGRES_DB: moony
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moony -d moony"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-8090}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://moony:moony@postgres:5432/moony
      CATALOG_PATH: ${CATALOG_PATH:-/app/catalog/catalog.json}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5190,http://localhost:5173,http://localhost:3000}
    volumes:
      - ./backend:/app
      - ./catalog:/app/catalog:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${WEB_HOST_PORT:-5190}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
